<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Grabber | Deep Disguise Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; }
        .terminal-input { background: #111; border: 1px solid #0f0; color: #0f0; }
        .scan-line { width: 100%; height: 2px; background: rgba(0, 255, 0, 0.1); position: fixed; animation: scan 4s linear infinite; }
        @keyframes scan { from { top: 0; } to { top: 100%; } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="scan-line"></div>
    
    <div class="w-full max-w-xl space-y-6">
        <div class="border border-[#0f0] p-6 space-y-4 shadow-[0_0_15px_rgba(0,255,0,0.3)]">
            <h1 class="text-xl font-bold tracking-widest uppercase">>>> SYSTEM_GRABBER_V4.0</h1>
            <p class="text-[10px] text-green-700 uppercase">Status: Bypassing Firewall...</p>
            
            <input type="text" id="target" placeholder="ENTER_VIDOY_URL_HERE" 
                   class="w-full terminal-input p-4 outline-none text-sm font-bold">
            
            <button onclick="executeGrab()" id="btn" class="w-full bg-[#0f0] text-black font-black py-4 hover:bg-white transition-all uppercase text-xs">
                EXECUTE_EXTRACTION
            </button>
        </div>

        <div id="log" class="text-[10px] space-y-1 font-mono text-green-800 h-20 overflow-hidden"></div>
    </div>

    <script>
        function logMsg(msg) {
            const log = document.getElementById('log');
            log.innerHTML += `<div>> ${msg}</div>`;
            log.scrollTop = log.scrollHeight;
        }

        async function executeGrab() {
            const url = document.getElementById('target').value;
            const btn = document.getElementById('btn');
            if(!url) return;

            btn.disabled = true;
            logMsg("Initializing Ghost Protocol...");
            logMsg("Injecting Chrome Fingerprints...");

            try {
                const res = await fetch(`/api/grab?url=${encodeURIComponent(url)}`);
                const data = await res.json();

                if(data.success) {
                    logMsg("SUCCESS: Link Decrypted.");
                    window.open(data.downloadUrl, '_blank');
                } else {
                    logMsg("FAILED: " + data.error);
                }
            } catch(e) {
                logMsg("CRITICAL_ERROR: Connection Terminated.");
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
