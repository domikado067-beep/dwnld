<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VidGrab Pro | Fast & Secure Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020202; color: #fff; }
        .glass-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(20px); }
        .btn-gradient { background: linear-gradient(135deg, #ef4444 0%, #991b1b 100%); }
        .loader { border-top-color: #ef4444; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">

    <div class="w-full max-w-xl text-center space-y-10">
        <div class="space-y-1">
            <h1 class="text-5xl font-black italic tracking-tighter">VID<span class="text-red-600">GRAB</span></h1>
            <p class="text-zinc-600 text-[10px] font-bold tracking-[0.5em] uppercase">Private Cloud Processing</p>
        </div>

        <div class="glass-card p-2 rounded-3xl flex flex-col md:flex-row gap-2 shadow-2xl">
            <input type="text" id="targetUrl" placeholder="Tempel URL Vidoy di sini..." 
                   class="flex-1 bg-transparent border-none px-6 py-4 text-sm focus:outline-none">
            <button onclick="processVideo()" id="btnAction" class="btn-gradient px-8 py-4 rounded-2xl font-black text-xs tracking-widest uppercase transition-all active:scale-95">
                UNDUH VIDEO
            </button>
        </div>

        <div id="statusBox" class="hidden glass-card p-10 rounded-3xl animate-bounce-in">
            <div id="loadingState" class="hidden flex flex-col items-center gap-4">
                <div class="w-10 h-10 border-4 border-zinc-800 rounded-full loader"></div>
                <p class="text-[10px] font-mono text-zinc-500 uppercase tracking-widest">Bypassing Tokens...</p>
            </div>

            <div id="resultState" class="hidden space-y-6">
                <div class="w-14 h-14 bg-green-500/10 text-green-500 rounded-full flex items-center justify-center mx-auto text-2xl">✓</div>
                <h3 class="font-bold text-xl uppercase tracking-tighter">Ekstraksi Berhasil</h3>
                <a id="dlButton" href="#" target="_blank" class="block w-full bg-white text-black font-black py-4 rounded-xl hover:bg-red-600 hover:text-white transition-all text-sm uppercase tracking-widest">
                    Simpan Video Sekarang
                </a>
                <p class="text-[9px] text-zinc-600 uppercase italic leading-loose">Peringatan: Link bersifat sementara. Segera unduh sebelum kedaluwarsa.</p>
            </div>
        </div>
    </div>

    <footer class="mt-20 text-zinc-800 text-[8px] font-black tracking-widest uppercase">
        Infrastructure by Cloudflare Edge Runtime v5.0
    </footer>

    <script>
        async function processVideo() {
            const url = document.getElementById('targetUrl').value;
            const statusBox = document.getElementById('statusBox');
            const loadingState = document.getElementById('loadingState');
            const resultState = document.getElementById('resultState');
            const btn = document.getElementById('btnAction');

            if (!url) return alert("URL ga boleh kosong!");

            // UI Reset
            btn.disabled = true;
            statusBox.classList.remove('hidden');
            loadingState.classList.remove('hidden');
            resultState.classList.add('hidden');

            try {
                // Fetch ke API Cloudflare Functions
                const res = await fetch(`/api/grab?url=${encodeURIComponent(url)}`);
                
                // Handling Unexpected end of JSON input
                const text = await res.text();
                let data;
                
                try {
                    data = JSON.parse(text);
                } catch (e) {
                    console.error("Respon bukan JSON:", text);
                    throw new Error("Server ngirim data rusak atau diblokir Vidoy.");
                }

                if (data.success) {
                    document.getElementById('dlButton').href = data.downloadUrl;
                    loadingState.classList.add('hidden');
                    resultState.classList.remove('hidden');
                } else {
                    throw new Error(data.error);
                }

            } catch (err) {
                alert("ERROR: " + err.message);
                statusBox.classList.add('hidden');
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
